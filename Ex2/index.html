<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow | To-Do Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ================= AUTH SCREEN ================= -->
  <div id="authScreen" class="auth-screen">
    <div class="auth-card">
      <h1 class="brand">Task<span>Flow</span></h1>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form">
        <h2>Login</h2>
        <input type="text" id="loginUsername" placeholder="Username" required>
        <input type="password" id="loginPassword" placeholder="Password" required>
        <button type="submit">Login</button>
        <p class="switch-text">New here? <a href="#" id="showSignup">Create an account</a></p>
        <p class="error-msg" id="loginError"></p>
      </form>

      <!-- Signup Form -->
      <form id="signupForm" class="auth-form hidden">
        <h2>Create Account</h2>
        <input type="text" id="signupUsername" placeholder="Choose a username" required>
        <input type="password" id="signupPassword" placeholder="Choose a password" required>
        <button type="submit">Sign Up</button>
        <p class="switch-text">Already have an account? <a href="#" id="showLogin">Login</a></p>
        <p class="error-msg" id="signupError"></p>
      </form>
    </div>
  </div>

  <!-- ================= DASHBOARD ================= -->
  <div id="dashboard" class="dashboard hidden">
    <header class="dash-header">
      <h1 class="brand">Task<span>Flow</span></h1>
      <div class="user-info">
        <span id="welcomeText">Welcome!</span>
        <button id="logoutBtn">Logout</button>
      </div>
    </header>

    <main class="dash-main">
      <form id="addTaskForm" class="add-task-form">
        <input type="text" id="taskInput" placeholder="Add a new task..." required>
        <select id="priorityInput">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
        <button type="submit">Add Task</button>
      </form>

      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
        <span class="task-count" id="taskCount"></span>
      </div>

      <ul class="task-list" id="taskList">
        <!-- Injected by JS -->
      </ul>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
