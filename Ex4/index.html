<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoodHub | Order Food Online</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ================= HEADER ================= -->
  <header class="navbar">
    <h1 class="logo" id="logoHome">Food<span>Hub</span></h1>
    <input type="text" id="searchInput" placeholder="Search restaurants or cuisines...">
    <button id="cartBtn">🛒 Cart <span id="cartBadge">0</span></button>
  </header>

  <!-- ================= RESTAURANT LIST VIEW ================= -->
  <main id="restaurantListView" class="view">
    <div class="cuisine-bar" id="cuisineBar"></div>
    <div class="restaurant-grid" id="restaurantGrid"></div>
  </main>

  <!-- ================= MENU VIEW ================= -->
  <main id="menuView" class="view hidden">
    <button class="back-btn" id="backToListBtn">← Back to Restaurants</button>
    <div class="restaurant-banner" id="restaurantBanner"></div>
    <div class="menu-list" id="menuList"></div>
  </main>

  <!-- ================= CART DRAWER ================= -->
  <div class="drawer-overlay" id="cartOverlay">
    <div class="drawer">
      <div class="drawer-header">
        <h2>Your Cart</h2>
        <button id="closeCartBtn">✕</button>
      </div>
      <div class="cart-items" id="cartItems"></div>
      <div class="cart-summary" id="cartSummary"></div>
      <button class="checkout-btn" id="checkoutBtn">Proceed to Checkout</button>
    </div>
  </div>

  <!-- ================= CHECKOUT MODAL ================= -->
  <div class="modal-overlay" id="checkoutOverlay">
    <div class="modal">
      <h2>Checkout</h2>
      <form id="checkoutForm">
        <input type="text" id="addressInput" placeholder="Delivery Address" required>
        <input type="tel" id="phoneInput" placeholder="Phone Number" required>
        <label class="section-label">Payment Method</label>
        <div class="payment-options">
          <label><input type="radio" name="payment" value="COD" checked> Cash on Delivery</label>
          <label><input type="radio" name="payment" value="UPI"> UPI</label>
          <label><input type="radio" name="payment" value="Card"> Credit/Debit Card</label>
        </div>
        <div class="checkout-total" id="checkoutTotal"></div>
        <div class="modal-actions">
          <button type="button" id="cancelCheckoutBtn">Cancel</button>
          <button type="submit">Place Order</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ================= ORDER TRACKING MODAL ================= -->
  <div class="modal-overlay" id="trackingOverlay">
    <div class="modal">
      <h2>Order Confirmed! 🎉</h2>
      <p class="order-id" id="orderIdText"></p>
      <div class="tracking-steps" id="trackingSteps">
        <div class="step active" data-step="1">✅ Order Placed</div>
        <div class="step" data-step="2">👨‍🍳 Preparing Food</div>
        <div class="step" data-step="3">🛵 Out for Delivery</div>
        <div class="step" data-step="4">📦 Delivered</div>
      </div>
      <button id="closeTrackingBtn">Done</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
