<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snapstory</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ================= AUTH SCREEN ================= -->
  <div id="authScreen" class="auth-screen">
    <div class="auth-card">
      <h1 class="brand">Snapstory</h1>

      <form id="loginForm" class="auth-form">
        <input type="text" id="loginUsername" placeholder="Username" required>
        <input type="password" id="loginPassword" placeholder="Password" required>
        <button type="submit">Log In</button>
        <p class="switch-text">Don't have an account? <a href="#" id="showSignup">Sign up</a></p>
        <p class="error-msg" id="loginError"></p>
      </form>

      <form id="signupForm" class="auth-form hidden">
        <input type="text" id="signupUsername" placeholder="Username" required>
        <input type="password" id="signupPassword" placeholder="Password" required>
        <button type="submit">Sign Up</button>
        <p class="switch-text">Have an account? <a href="#" id="showLogin">Log in</a></p>
        <p class="error-msg" id="signupError"></p>
      </form>
    </div>
  </div>

  <!-- ================= MAIN APP ================= -->
  <div id="app" class="app hidden">
    <header class="app-header">
      <h1 class="brand">Snapstory</h1>
      <div class="header-icons">
        <button class="icon-btn" id="uploadBtn" title="New Post">➕</button>
        <button class="icon-btn" id="logoutBtn" title="Logout">⏻</button>
      </div>
    </header>

    <nav class="tab-bar">
      <button class="tab-btn active" data-tab="feed">🏠 Feed</button>
      <button class="tab-btn" data-tab="discover">🔍 Discover</button>
      <button class="tab-btn" data-tab="profile">👤 Profile</button>
    </nav>

    <main class="app-main">

      <!-- Stories Bar -->
      <div class="stories-bar" id="storiesBar"></div>

      <!-- Feed Tab -->
      <section id="feedTab" class="tab-content">
        <div class="post-list" id="feedList"></div>
      </section>

      <!-- Discover Tab -->
      <section id="discoverTab" class="tab-content hidden">
        <div class="people-list" id="discoverList"></div>
      </section>

      <!-- Profile Tab -->
      <section id="profileTab" class="tab-content hidden">
        <div class="profile-header">
          <div class="avatar-lg" id="profileAvatar"></div>
          <div class="profile-info">
            <h2 id="profileUsername"></h2>
            <div class="profile-stats">
              <span><strong id="postCount">0</strong> posts</span>
              <span><strong id="followingCount">0</strong> following</span>
            </div>
          </div>
        </div>
        <div class="post-grid" id="profileGrid"></div>
      </section>

    </main>
  </div>

  <!-- Upload Modal -->
  <div class="modal-overlay" id="uploadOverlay">
    <div class="modal">
      <h2>New Post</h2>
      <form id="uploadForm">
        <input type="text" id="imageUrlInput" placeholder="Image URL (paste a link)" required>
        <textarea id="captionInput" placeholder="Write a caption..." required></textarea>
        <div class="modal-actions">
          <button type="button" id="cancelUploadBtn">Cancel</button>
          <button type="submit">Share</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
